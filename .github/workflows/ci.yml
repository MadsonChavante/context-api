name: Backend CI/CD

"on":
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build, Testes e Cobertura
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build e testes
        run: mvn clean verify --batch-mode

      - name: Publicar relatório de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

  sonar:
    name: Qualidade de Código (SonarCloud)
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: coont

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Análise SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            --batch-mode

  security-check:
    name: Análise de Vulnerabilidades (OWASP)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: OWASP Dependency Check
        continue-on-error: true
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
            -Dformat=JSON \
            -DprettyPrint=true \
            --batch-mode

      - name: Publicar relatório OWASP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: |
            target/dependency-check-report.json
            target/dependency-check-report.html

      - name: Criar issues GitHub para vulnerabilidades
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const reportPath = 'target/dependency-check-report.json';
            if (!fs.existsSync(reportPath)) {
              console.log('Relatório OWASP não encontrado — sem vulnerabilidades para reportar.');
              return;
            }

            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const dependencies = report.dependencies || [];

            const vulnerable = dependencies.filter(dep =>
              dep.vulnerabilities && dep.vulnerabilities.length > 0
            );

            if (vulnerable.length === 0) {
              console.log('Nenhuma vulnerabilidade encontrada.');
              return;
            }

            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security',
              state: 'open',
              per_page: 100
            });

            const existingTitles = existingIssues.data.map(i => i.title);

            for (const dep of vulnerable) {
              for (const vuln of dep.vulnerabilities) {
                const cvssScore = vuln.cvssv3?.baseScore || vuln.cvssv2?.score || 'N/A';
                const severity  = vuln.cvssv3?.baseSeverity || vuln.severity || 'UNKNOWN';

                const emoji = {
                  CRITICAL: '🔴',
                  HIGH:     '🟠',
                  MEDIUM:   '🟡',
                  LOW:      '🟢',
                }[severity.toUpperCase()] || '⚪';

                const title = `${emoji} [SECURITY] ${vuln.name} em ${dep.fileName}`;

                if (existingTitles.includes(title)) {
                  console.log(`Issue já existe: ${title}`);
                  continue;
                }

                const body = [
                  `## ${emoji} Vulnerabilidade detectada pelo OWASP Dependency Check`,
                  ``,
                  `| Campo        | Valor |`,
                  `|---|---|`,
                  `| **CVE**      | ${vuln.name} |`,
                  `| **Severity** | ${severity} |`,
                  `| **CVSS**     | ${cvssScore} |`,
                  `| **Ficheiro** | \`${dep.fileName}\` |`,
                  `| **Merge**    | ${context.sha} |`,
                  ``,
                  `### Descrição`,
                  vuln.description || 'Sem descrição disponível.',
                  ``,
                  `### Como resolver`,
                  `- Verifica se existe uma versão mais recente de \`${dep.fileName}\``,
                  `- Consulta https://nvd.nist.gov/vuln/detail/${vuln.name} para detalhes`,
                  `- Actualiza o \`pom.xml\` e cria um PR para correcção`,
                  ``,
                  `---`,
                  `*Issue criada automaticamente pelo pipeline de segurança.*`,
                ].join('\n');

                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  title,
                  body,
                  labels: ['security', severity.toLowerCase()],
                });

                console.log(`Issue criada: ${title}`);
              }
            }
