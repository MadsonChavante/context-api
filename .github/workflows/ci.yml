name: Backend CI/CD

"on":
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Build + Testes + Cobertura
  # ─────────────────────────────────────────
  build-and-test:
    name: Build, Testes e Cobertura
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # necessário para o SonarCloud analisar o histórico

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build e testes
        run: mvn clean verify --batch-mode

      # JaCoCo — falha o build se cobertura < 80%
      # (configurado no pom.xml — ver instrucoes abaixo)
      - name: Publicar relatório de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

  # ─────────────────────────────────────────
  # JOB 2 — OWASP Dependency Check
  # ─────────────────────────────────────────
  security-check:
    name: Análise de Vulnerabilidades (OWASP)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DsuppressionFile=owasp-suppressions.xml \
            --batch-mode
        # failBuildOnCVSS=7 → falha se houver CVE com score >= 7 (alta/crítica)
        # suppressionFile → ficheiro opcional para suprimir falsos positivos

      - name: Publicar relatório OWASP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: target/dependency-check-report.html

  # ─────────────────────────────────────────
  # JOB 3 — SonarCloud
  # ─────────────────────────────────────────
  sonar:
    name: Qualidade de Código (SonarCloud)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Análise SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            --batch-mode

  # ─────────────────────────────────────────
  # JOB 4 — Deploy no Render (só no merge para main)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy → Render
    runs-on: ubuntu-latest
    needs: [build-and-test, security-check, sonar]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger deploy no Render
        run: |
          curl --silent --show-error --fail \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        # O Render gera um Deploy Hook URL no painel:
        # Dashboard → Serviço → Settings → Deploy Hook