spring.application.name=context-api
spring.profiles.active=dev

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

server.port=8080
server.servlet.context-path=/api

logging.level.root=INFO
logging.level.com.contextapi=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

ai.provider=groq
openrouter.api.key=${OPENROUTER_API_KEY:}
openrouter.model=openai/gpt-4o
openrouter.api.url=https://openrouter.ai/api/v1/chat/completions

groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.1-8b-instant

# Google Cloud API (STT/TTS)
google.cloud.api.key=${GOOGLE_CLOUD_API_KEY:}
google.cloud.stt.language=en-US
google.cloud.stt.encoding=WEBM_OPUS
google.cloud.tts.language=en-US
google.cloud.tts.voice=en-US-Wavenet-D
google.cloud.tts.speaking-rate=1.0

