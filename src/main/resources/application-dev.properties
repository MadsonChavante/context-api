spring.config.import=optional:file:.env[.properties]

server.port=8080
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create-drop

groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.1-8b-instant

# Google Cloud API (STT/TTS)
google.cloud.api.key=${GOOGLE_CLOUD_API_KEY:}
google.cloud.stt.language=en-US
google.cloud.stt.encoding=WEBM_OPUS
google.cloud.tts.language=en-US
google.cloud.tts.voice=en-US-Wavenet-D
google.cloud.tts.speaking-rate=1.0

