server.port=8080

spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.1-8b-instant

openrouter.api.key=${OPENROUTER_API_KEY:}
openrouter.model=openai/gpt-4o
openrouter.api.url=https://openrouter.ai/api/v1/chat/completions

ai.provider=${ACTIVE_AI_PROVIDER:groq}

# Google Cloud API (STT/TTS)
google.cloud.api.key=${GOOGLE_CLOUD_API_KEY}
google.cloud.stt.language=en-US
google.cloud.stt.encoding=WEBM_OPUS
google.cloud.tts.language=en-US
google.cloud.tts.voice=en-US-Wavenet-D
google.cloud.tts.speaking-rate=1.0

